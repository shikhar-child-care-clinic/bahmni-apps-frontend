<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Bahmni</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
  </head>
  <body>
    <script>
      // Patch ResizeObserver to run callbacks asynchronously via requestAnimationFrame.
      // This breaks the synchronous loop that causes "ResizeObserver loop completed
      // with undelivered notifications" from Carbon's floating-ui autoAlign.
      (function () {
        var OriginalResizeObserver = window.ResizeObserver;
        window.ResizeObserver = function ResizeObserver(callback) {
          return new OriginalResizeObserver(function (entries, observer) {
            requestAnimationFrame(function () {
              callback(entries, observer);
            });
          });
        };
        window.ResizeObserver.prototype = OriginalResizeObserver.prototype;
      })();
    </script>
    <div id="root"></div>
  </body>
</html>
