sonar.projectKey=Bahmni_bahmni-apps-frontend
sonar.organization=bahmni
sonar.projectName=bahmni-apps-frontend

sonar.sources=apps,packages,distro
sonar.tests=apps,packages,distro
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Coverage report merged from all Nx project lcov reports
sonar.javascript.lcov.reportPaths=test-output/jest/coverage/lcov.info

sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/stories/**,**/__mocks__/**

sonar.exclusions=apps/clinical/setupTests.ts,apps/clinical/setupTests.i18n.ts
# Exclude specific files from duplicate code detection (CPD)
# The getBrowserLocaleDateFormat() function in dateFormatUtils.ts is intentionally duplicated
# between the design-system and services packages to avoid creating a dependency between them.
sonar.cpd.exclusions=packages/bahmni-design-system/src/molecules/datePicker/dateFormatUtils.ts

sonar.sourceEncoding=UTF-8
